project:
  title: "Serial Fixed-Point ALU with Shared Datapath"
  author: "Alisson Rosero"
  discord: ""
  description: "7-bit serial fixed-point ALU with shared datapath. Loads operands bit-serially LSB-first and supports arithmetic, logic, saturating arithmetic, and signed compare-min."
  language: "Verilog"
  clock_hz: 50000000
  tiles: "1x1"
  top_module: "tt_um_alissonrosero_alu7"

  source_files:
    - "aluPuntoFijo.v"
    - "tt_um_alissonrosero_alu7.v"

pinout:
  ui[0]: "Bit_in"
  ui[1]: "OP[0]"
  ui[2]: "OP[1]"
  ui[3]: "OP[2]"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  uo[0]: "Data_out[0]"
  uo[1]: "Data_out[1]"
  uo[2]: "Data_out[2]"
  uo[3]: "Data_out[3]"
  uo[4]: "Data_out[4]"
  uo[5]: "Data_out[5]"
  uo[6]: "Data_out[6]"
  uo[7]: "Done"

  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

